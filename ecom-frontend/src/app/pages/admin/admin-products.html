<app-navbar></app-navbar>
<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-8">

    <h2 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-3">
      Add New Product
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Product Name</label>
        <input [(ngModel)]="product.name" placeholder="Nike Air Max"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Brand</label>
        <input [(ngModel)]="product.brand" placeholder="Nike"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Category</label>
        <input [(ngModel)]="product.category" placeholder="Shoes"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Price</label>
        <input type="number" [(ngModel)]="product.price" placeholder="₹1999"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Stock</label>
        <input type="number" [(ngModel)]="product.stock" placeholder="50"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Image URL</label>
        <input [(ngModel)]="product.imageUrl" placeholder="https://image.com/product.jpg"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

    </div>

    <div class="mt-5">
      <label class="block text-sm font-semibold text-gray-600 mb-1">Description</label>
      <textarea [(ngModel)]="product.description" rows="3"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
        placeholder="Write product description..."></textarea>
    </div>

    <!-- Image Preview -->
    <div *ngIf="product.imageUrl" class="mt-6">
      <p class="text-sm font-semibold text-gray-600 mb-2">Preview</p>
      <img [src]="product.imageUrl"
        class="w-40 h-40 object-cover rounded-lg border">
    </div>

    <!-- Button -->
    <button (click)="createProduct()"
      class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md">
      Create Product
    </button>

  </div>

</div>
