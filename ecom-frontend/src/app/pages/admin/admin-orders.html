<div class="p-10 bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<!-- Header -->
<div class="flex justify-between items-center mb-10">

<div>
<h1 class="text-4xl font-bold text-gray-800">Orders</h1>
<p class="text-gray-500">Track and manage orders</p>
</div>

<div class="bg-white shadow px-6 py-3 rounded-xl">
<span class="text-gray-500 text-sm">Total Orders</span>
<p class="text-xl font-bold text-indigo-600">{{orders.length}}</p>
</div>

</div>

<!-- Table Card -->
<div class="bg-white shadow-2xl rounded-2xl overflow-hidden">

<table class="w-full">

<thead class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-sm">

<tr>
<th class="px-6 py-4">Order</th>
<th class="px-6 py-4">Customer</th>
<th class="px-6 py-4">Amount</th>
<th class="px-6 py-4">Status</th>
<th class="px-6 py-4">Payment</th>
<th class="px-6 py-4">Method</th>
<th class="px-6 py-4 text-center">Actions</th>
</tr>

</thead>

<tbody class="divide-y">

<tr *ngFor="let o of orders"
class="hover:bg-indigo-50 transition">

<td class="px-6 py-4 font-semibold">#{{o.id}}</td>

<td class="px-6 py-4 text-gray-600">{{o.userEmail}}</td>

<td class="px-6 py-4 font-bold text-indigo-600">₹{{o.totalAmount}}</td>

<td class="px-6 py-4">
<span class="status">
{{o.status}}
</span>
</td>

<td class="px-6 py-4">
<span class="payment">
{{o.paymentStatus}}
</span>
</td>

<td class="px-6 py-4">{{o.paymentMethod}}</td>

<td class="px-6 py-4">

<div class="flex justify-center gap-2">

<button
*ngIf="o.status?.toUpperCase()==='CONFIRMED'"
class="btn-blue">
Ship
</button>

<button
*ngIf="o.status?.toUpperCase()==='SHIPPED'"
class="btn-green">
Deliver
</button>

<button
class="btn-dark">
Delete
</button>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</div>
