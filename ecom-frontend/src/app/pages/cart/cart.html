<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-100 py-12 px-6">

<div class="max-w-7xl mx-auto">

<!-- Title -->
<div class="flex justify-between items-center mb-10">

<h2 class="text-4xl font-bold text-gray-800">
Shopping Cart
</h2>

<span *ngIf="cart?.items?.length"
class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full text-sm">
{{ cart.items.length }} Items
</span>

</div>

<div *ngIf="cart?.items?.length > 0; else empty"
class="grid lg:grid-cols-3 gap-10">

<!-- Cart Items -->
<div class="lg:col-span-2 space-y-6">

<div *ngFor="let item of cart.items"
class="bg-white p-6 rounded-xl shadow-sm border flex justify-between">

<div>

<h4 class="text-lg font-semibold text-gray-800">
{{ item.productName }}
</h4>

<p class="text-indigo-600 font-medium mt-1">
₹ {{ item.price }}
</p>

<button
(click)="remove(item.itemId)"
class="text-red-500 text-sm mt-2 hover:text-red-700">
Remove
</button>

</div>

<div class="text-right">

<div class="flex items-center gap-4 mb-3 justify-end">

<button
(click)="decrease(item)"
class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300">
-
</button>

<span class="font-semibold">
{{ item.quantity }}
</span>

<button
(click)="increase(item)"
class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300">
+
</button>

</div>

<p class="font-bold text-lg">
₹ {{ item.price * item.quantity }}
</p>

</div>

</div>

</div>

<!-- Summary -->
<div class="bg-white p-8 rounded-xl shadow-sm border h-fit sticky top-24">

<h3 class="text-xl font-semibold mb-6">
Order Summary
</h3>

<div class="space-y-3 text-gray-600">

<div class="flex justify-between">
<span>Subtotal</span>
<span>₹ {{ total }}</span>
</div>

<div class="flex justify-between">
<span>Shipping</span>
<span class="text-green-600">Free</span>
</div>

</div>

<hr class="my-5">

<div class="flex justify-between font-bold text-lg">
<span>Total</span>
<span>₹ {{ total }}</span>
</div>

<button
routerLink="/checkout"
class="w-full mt-6 bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
Proceed to Checkout
</button>

<button
(click)="clearCart()"
class="w-full border border-red-500 text-red-500 py-3 rounded-lg mt-3 hover:bg-red-50">
Clear Cart
</button>

</div>

</div>

<!-- Empty -->
<ng-template #empty>

<div class="bg-white rounded-xl shadow-sm p-16 text-center">

<div class="text-6xl mb-4">🛍️</div>

<h3 class="text-xl font-semibold mb-2">
Your Cart is Empty
</h3>

<p class="text-gray-500 mb-6">
Start adding products to your cart.
</p>

<a routerLink="/home"
class="bg-indigo-600 text-white px-6 py-3 rounded-lg">
Start Shopping
</a>

</div>

</ng-template>

</div>

</div>
