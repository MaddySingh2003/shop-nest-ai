<div class="min-h-screen flex">

  <!-- LEFT BRANDING PANEL -->
  <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-indigo-600 to-purple-700 text-white items-center justify-center p-12">
    <div class="max-w-md">
      <div class="flex flex-col items-start">
  
  <!-- LOGO -->
  <img 
    src="assets/logo.png" 
    alt="ShopNest AI Logo"
    class="w-50 mb-4"
  />

  <!-- HEADING -->
  <h1 class="text-4xl font-bold mb-6">Welcome Back 👋</h1>

</div>
      <p class="text-lg opacity-90 mb-6">
        Login to continue shopping the latest trends, exclusive deals,
        and premium products curated just for you.
      </p>
      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <span class="bg-white/20 p-2 rounded-full">✓</span>
          <p>Fast & Secure Checkout</p>
        </div>
        <div class="flex items-center gap-3">
          <span class="bg-white/20 p-2 rounded-full">✓</span>
          <p>Exclusive Member Discounts</p>
        </div>
        <div class="flex items-center gap-3">
          <span class="bg-white/20 p-2 rounded-full">✓</span>
          <p>Track Your Orders Easily</p>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT LOGIN FORM PANEL -->
  <div class="flex w-full lg:w-1/2 items-center justify-center bg-gray-50 p-8">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl">

      <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Login</h2>
      <p class="text-gray-500 text-center mb-6">Sign in to your account</p>

      <!-- ERROR MESSAGE -->
      <p *ngIf="error" class="text-red-500 text-sm mb-4 text-center">{{ error }}</p>

      <!-- LOGIN FORM -->
      <form (submit)="submit($event)">

        <!-- EMAIL -->
        <div class="mb-4">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Email Address"
            class="w-full border px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm hover:shadow-md"
          />
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Password"
            class="w-full border px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm hover:shadow-md"
          />
        </div>

        <!-- OPTIONS -->
        <div class="flex justify-between items-center mb-6 text-sm">
          <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500" />
            Remember me
          </label>
          <a class="text-indigo-600 hover:underline cursor-pointer">Forgot password?</a>
        </div>

        <!-- LOGIN BUTTON -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-lg hover:shadow-xl disabled:opacity-60"
        >
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>

      </form>

      <!-- REGISTER LINK -->
      <p class="text-center text-gray-500 text-sm mt-6">
        Don’t have an account?
        <button (click)="registerR()" class="text-indigo-600 font-semibold hover:underline ml-1">
          Sign up
        </button>
      </p>

    </div>
  </div>

</div>
