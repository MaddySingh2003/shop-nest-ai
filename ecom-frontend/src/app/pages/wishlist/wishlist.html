<div class="bg-gray-100 min-h-screen py-10 px-6">

<div class="max-w-6xl mx-auto">

<h2 class="text-3xl font-bold text-gray-800 mb-8">
❤️ My Wishlist
</h2>

<!-- Loading -->
<div *ngIf="loading" class="text-center text-gray-500 py-12">
Loading wishlist...
</div>

<!-- Empty -->
<div *ngIf="!loading && wishlist.length === 0"
class="bg-white rounded-xl shadow p-10 text-center text-gray-500">

<p class="mb-4">
Your wishlist is empty
</p>

<a routerLink="/home"
class="bg-indigo-600 text-white px-6 py-2 rounded-lg">
Start Shopping
</a>

</div>

<!-- Wishlist Items -->

<div *ngIf="!loading && wishlist.length > 0"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

<div
*ngFor="let p of wishlist"
class="bg-white rounded-xl shadow-sm hover:shadow-lg transition p-6">

<h4 class="text-lg font-semibold text-gray-800 mb-2">
{{ p.name }}
</h4>

<p class="text-gray-600 font-medium mb-4">
₹ {{ p.price }}
</p>

<div class="flex gap-3">

<button
(click)="moveToCart(p)"
class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">
Move to Cart
</button>

<button
(click)="remove(p.id)"
class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg">
Remove
</button>

</div>

</div>

</div>

</div>

</div>
