<app-navbar></app-navbar>

<div class="bg-gray-100 min-h-screen py-12 px-6">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-10">

    <!-- Sidebar -->
    <div class="bg-white rounded-2xl shadow-sm border p-8 h-fit">

      <!-- Profile -->
      <div class="flex flex-col items-center text-center">

        <div class="w-20 h-20 rounded-full bg-gradient-to-br 
                    from-indigo-600 to-purple-600 text-white 
                    flex items-center justify-center 
                    text-2xl font-semibold mb-4">
          {{ user?.name?.charAt(0) || 'U' }}
        </div>

        <p class="font-semibold text-gray-800 text-lg">
          {{ user?.name }}
        </p>

        <p class="text-gray-500 text-sm">
          {{ user?.email }}
        </p>

      </div>

      <hr class="my-6">

      <!-- Navigation -->
      <nav class="space-y-3 text-sm font-medium">

        <a routerLink="profile"
           routerLinkActive="bg-indigo-600 text-white"
           class="block px-4 py-3 rounded-lg hover:bg-gray-100 transition">
          👤 About
        </a>

        <a routerLink="orders"
           *ngIf="auth.isUser()"
           routerLinkActive="bg-indigo-600 text-white"
           class="block px-4 py-3 rounded-lg hover:bg-gray-100 transition">
          📦 My Orders
        </a>

        <a routerLink="wishlist"
           *ngIf="auth.isUser()"
           routerLinkActive="bg-indigo-600 text-white"
           class="block px-4 py-3 rounded-lg hover:bg-gray-100 transition">
          ❤️ Wishlist
        </a>

        <a routerLink="dashboard"
           *ngIf="auth.isAdmin()"
           routerLinkActive="bg-indigo-600 text-white"
           class="block px-4 py-3 rounded-lg hover:bg-gray-100 transition">
          📊 Dashboard
        </a>

        <a routerLink="A-orders"
           *ngIf="auth.isAdmin()"
           routerLinkActive="bg-indigo-600 text-white"
           class="block px-4 py-3 rounded-lg hover:bg-gray-100 transition">
          🧾 Admin Orders
        </a>

      </nav>

    </div>

    <!-- Dynamic Content -->
    <div class="lg:col-span-3">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
<app-footer></app-footer>
