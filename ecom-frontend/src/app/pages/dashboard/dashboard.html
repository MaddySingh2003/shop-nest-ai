<div class="p-12 bg-gradient-to-br from-gray-50 to-indigo-50 min-h-screen">

<h2 class="text-4xl font-bold mb-10 text-gray-800">
📊 Admin Dashboard
</h2>

<div class="grid md:grid-cols-4 gap-8">

<!-- Orders -->
<div class="card">

<div class="text-3xl">📦</div>

<p class="text-gray-500">Total Orders</p>

<h3 class="text-3xl font-bold text-indigo-600">
{{stats?.totalOrders}}
</h3>

</div>

<!-- Revenue -->
<div class="card">

<div class="text-3xl">💰</div>

<p class="text-gray-500">Revenue</p>

<h3 class="text-3xl font-bold text-green-600">
₹{{stats?.totalRevenue}}
</h3>

</div>

<!-- Pending -->
<div class="card">

<div class="text-3xl">⏳</div>

<p class="text-gray-500">Pending Orders</p>

<h3 class="text-3xl font-bold text-yellow-500">
{{stats?.pendingOrders}}
</h3>

</div>

<!-- Delivered -->
<div class="card">

<div class="text-3xl">✅</div>

<p class="text-gray-500">Delivered Orders</p>

<h3 class="text-3xl font-bold text-green-600">
{{stats?.deliveredOrders}}
</h3>

</div>

</div>

</div>
