<app-navbar></app-navbar>
<div class="max-w-7xl mx-auto py-10 px-6">

<h2 class="text-2xl font-bold mb-6">
Search results for "{{keyword}}"
</h2>

<div *ngIf="products && products.length === 0" class="text-gray-500">
No products found.
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-6">

<div *ngFor="let p of products"
class="border rounded-lg p-4 hover:shadow-lg transition">

<img
[src]="p.imageUrl"
class="h-40 w-full object-cover mb-3 rounded"
/>

<h3 class="font-semibold">
{{p.name}}
</h3>

<p class="text-gray-500 text-sm">
{{p.brand}}
</p>

<p class="font-bold text-indigo-600 mt-2">
₹{{p.price}}
</p>

<a
[routerLink]="['/product',p.id]"
class="text-indigo-600 text-sm mt-2 block">
View Product
</a>

</div>

</div>
</div>
