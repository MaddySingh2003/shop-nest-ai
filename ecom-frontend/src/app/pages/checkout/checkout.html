<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-100 py-12 px-6">

<div class="max-w-7xl mx-auto">

<h2 class="text-4xl font-bold text-gray-800 mb-10">
Secure Checkout
</h2>

<div *ngIf="loading" class="text-center py-20">
Processing checkout...
</div>

<div *ngIf="!loading" class="grid lg:grid-cols-3 gap-10">

<!-- Address -->
<div class="lg:col-span-2">

<h3 class="text-2xl font-semibold mb-6">
Select Address
</h3>

<div *ngFor="let a of addresses"
(click)="addressId = a.id"
class="bg-white p-6 mb-5 rounded-xl shadow-sm border cursor-pointer"
[ngClass]="{
'border-indigo-600': addressId === a.id
}">

<p class="font-semibold">
{{a.fullName}}
</p>

<p class="text-gray-600">
{{a.street}}, {{a.city}}
</p>

<p class="text-gray-600">
{{a.state}} - {{a.zipCode}}
</p>

<p class="text-gray-500 text-sm">
📞 {{a.phone}}
</p>

</div>

<button
(click)="showForm = true"
class="bg-indigo-600 text-white px-5 py-3 rounded-lg">
+ Add Address
</button>

</div>

<!-- Summary -->
<div class="bg-white p-8 rounded-xl shadow-sm border h-fit sticky top-24">

<h3 class="text-xl font-semibold mb-5">
Order Summary
</h3>

<div class="space-y-3 text-gray-600">

<div class="flex justify-between">
<span>Subtotal</span>
<span>₹ {{ total }}</span>
</div>

<div *ngIf="discount > 0"
class="flex justify-between text-green-600">
<span>Discount</span>
<span>- ₹ {{ discount }}</span>
</div>

</div>

<hr class="my-5">

<div class="flex justify-between font-bold text-lg">
<span>Total</span>
<span>₹ {{ finalTotal }}</span>
</div>

<button
(click)="placeOrder()"
[disabled]="!addressId || total === 0 || outOfStock"
class="w-full mt-6 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 disabled:bg-gray-400">

{{ outOfStock ? 'Out of Stock' : 'Place Order' }}

</button>

</div>

</div>

</div>

</div>
